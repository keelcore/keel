apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "keel.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "keel.name" . }}
    helm.sh/chart: {{ include "keel.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "keel.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "keel.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "keel.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      volumes:
        # Generated keel.yaml config file
        - name: keel-config
          configMap:
            name: {{ include "keel.fullname" . }}-config
        {{- if .Values.keel.secrets.existingSecret }}
        - name: keel-secrets
          secret:
            secretName: {{ .Values.keel.secrets.existingSecret }}
        {{- end }}
        {{- if .Values.keel.tls.certSecretName }}
        - name: keel-tls
          secret:
            secretName: {{ .Values.keel.tls.certSecretName }}
        {{- end }}
        {{- if .Values.keel.upstream.tlsSecret }}
        - name: upstream-tls
          secret:
            secretName: {{ .Values.keel.upstream.tlsSecret }}
        {{- end }}
        {{- if .Values.keel.tls.acme.cachePVC }}
        - name: acme-cache
          persistentVolumeClaim:
            claimName: {{ .Values.keel.tls.acme.cachePVC }}
        {{- end }}
        {{- with .Values.keel.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}

      containers:

        # ── Keel container ────────────────────────────────────────────────────
        - name: keel
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.keel.extraArgs }}
          args:
            {{- range . }}
            - {{ . | quote }}
            {{- end }}
          {{- end }}

          env:
            - name: KEEL_CONFIG
              value: /etc/keel/keel.yaml
            {{- if .Values.keel.secrets.existingSecret }}
            - name: KEEL_SECRETS
              value: {{ .Values.keel.secrets.mountPath }}/keel-secrets.yaml
            {{- end }}
            {{- with .Values.keel.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

          ports:
            - name: http
              containerPort: {{ .Values.keel.listeners.http.port }}
              protocol: TCP
            {{- if .Values.keel.listeners.https.enabled }}
            - name: https
              containerPort: {{ .Values.keel.listeners.https.port }}
              protocol: TCP
            {{- end }}
            {{- if .Values.keel.listeners.h3.enabled }}
            - name: h3
              containerPort: {{ .Values.keel.listeners.h3.port }}
              protocol: UDP
            {{- end }}
            - name: health
              containerPort: {{ .Values.keel.listeners.health.port }}
              protocol: TCP
            - name: ready
              containerPort: {{ .Values.keel.listeners.ready.port }}
              protocol: TCP
            {{- if .Values.keel.listeners.startup.enabled }}
            - name: startup
              containerPort: {{ .Values.keel.listeners.startup.port }}
              protocol: TCP
            {{- end }}
            {{- if .Values.keel.listeners.admin.enabled }}
            - name: admin
              containerPort: {{ .Values.keel.listeners.admin.port }}
              protocol: TCP
            {{- end }}

          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 2
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /readyz
              port: ready
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3

          {{- if .Values.keel.listeners.startup.enabled }}
          startupProbe:
            httpGet:
              path: /startupz
              port: startup
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 30
          {{- end }}

          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep {{ .Values.keel.timeouts.prestopSleep | trimSuffix `s` | default `0` }}"]

          volumeMounts:
            - name: keel-config
              mountPath: /etc/keel/keel.yaml
              subPath: keel.yaml
              readOnly: true
            {{- if .Values.keel.secrets.existingSecret }}
            - name: keel-secrets
              mountPath: {{ .Values.keel.secrets.mountPath }}
              readOnly: true
            {{- end }}
            {{- if .Values.keel.tls.certSecretName }}
            - name: keel-tls
              mountPath: /etc/keel/tls
              readOnly: true
            {{- end }}
            {{- if .Values.keel.upstream.tlsSecret }}
            - name: upstream-tls
              mountPath: /etc/keel/secrets/upstream-tls
              readOnly: true
            {{- end }}
            {{- if .Values.keel.tls.acme.cachePVC }}
            - name: acme-cache
              mountPath: /var/lib/keel/acme
            {{- end }}
            {{- with .Values.keel.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

        # ── App container (sidecar mode only) ─────────────────────────────────
        {{- if eq .Values.mode "sidecar" }}
        - name: app
          image: "{{ .Values.sidecar.app.image }}:{{ .Values.sidecar.app.tag }}"
          imagePullPolicy: {{ .Values.sidecar.app.pullPolicy }}
          {{- with .Values.sidecar.app.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.sidecar.app.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.sidecar.app.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: app
              containerPort: {{ .Values.sidecar.app.port }}
              protocol: TCP
          {{- with .Values.sidecar.app.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}