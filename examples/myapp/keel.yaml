# keel.yaml — example myapp configuration
# All keel features shown; adjust for your environment.
# Set APP_CONFIG=/path/to/this/file before starting.

app:
  name: myapp

keel:
  listeners:
    http:     { enabled: true,  port: 8080 }
    https:    { enabled: true,  port: 8443 }
    h3:       { enabled: true,  port: 8443 }
    health:   { enabled: true,  port: 9091 }
    ready:    { enabled: true,  port: 9092 }
    startup:  { enabled: true,  port: 9093 }
    admin:    { enabled: true,  port: 9999 }

  tls:
    cert_file: /etc/myapp/tls.crt
    key_file:  /etc/myapp/tls.key

  security:
    owasp_headers:          true
    hsts_max_age:           63072000
    max_header_bytes:       65536
    max_request_body_bytes: 10485760   # 10 MB
    max_response_body_bytes: 52428800  # 50 MB

  timeouts:
    read_header:    5s
    read:           30s
    write:          30s
    idle:           60s
    shutdown_drain: 10s
    prestop_sleep:  0s

  limits:
    max_concurrent: 0   # 0 = unlimited
    queue_depth:    0

  backpressure:
    heap_max_bytes:   0
    high_watermark:   0.85
    low_watermark:    0.70
    shedding_enabled: true

  authn:
    enabled: true
    my_id:   myapp
    # trusted_ids:  [peer-a, peer-b]
    # my_signature_key_file: /etc/myapp/authn.key

  logging:
    json:       true
    level:      info
    access_log: true
    remote_sink:
      enabled:  false
      endpoint: ""
      protocol: http

  metrics:
    prometheus: true
    statsd:
      enabled:  false
      endpoint: ""
      prefix:   myapp

  tracing:
    otlp:
      enabled:  true
      endpoint: otel-collector:4317
      insecure: true

  fips:
    monitor: true
