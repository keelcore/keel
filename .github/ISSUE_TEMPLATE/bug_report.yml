name: 🐛 Bug Report
description: Report a bug or something not working as expected
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ⚡ **Already started working on a fix / feature / PoC?**

        → We **love** that! Please consider sending a **Pull Request** instead of (or together with) opening an issue.

        Quick path:
        1. Fork the repo
        2. Create a branch & push your changes to **your fork**
        3. Open a PR to this repo (see [LAZY.md](./docs/LAZY.md) for the happy flow)

        We review code **much faster** than discussion threads.  
        Even rough drafts / experiments are welcome — just mark the PR as draft!

        (If you're not ready to PR yet, no worries — open the issue normally.)

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what happened.
      placeholder: "I clicked X and then Y happened instead of Z..."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: List steps that reliably trigger the issue.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs / Error messages
      description: If applicable, add images, console output, stack traces, etc.
    validations:
      required: false

  - type: input
    id: environment
    attributes:
      label: Environment
      description: e.g. OS, version, browser (if relevant)
      placeholder: "Ubuntu 24.04, v1.5.2, Firefox 134"
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Anything else we should know?
