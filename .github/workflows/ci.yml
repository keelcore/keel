name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs for the same branch/PR.
# Keep main-branch runs to completion so history is complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Default: least privilege. Jobs that need more declare it explicitly.
permissions:
  contents: read

jobs:

  # ---------------------------------------------------------------------------
  # PR Policy — required gate; runs before build and test jobs.
  # All policy logic lives in scripts/ci/pr-policy.sh.
  # ---------------------------------------------------------------------------
  pr-policy:
    name: PR Policy
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Check PR policy
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: bash scripts/ci/pr-policy.sh

  # ---------------------------------------------------------------------------
  # Secret Scan — required gate; runs on every push and PR.
  # ---------------------------------------------------------------------------
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Scan for secrets
        run: bash scripts/ci/secret-scan.sh

  # ---------------------------------------------------------------------------
  # Consistency — verifies Go config struct, Helm values, configmap template,
  # and config-reference.md are globally in sync.
  # ---------------------------------------------------------------------------
  consistency:
    name: Consistency
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          submodules: recursive
      - name: Install Helm
        run: bash scripts/ci/setup-helm.sh
      - name: Install bats-core
        run: bash scripts/ci/setup-bats.sh
      - name: Run consistency suite
        run: bash scripts/test/consistency.sh

  # ---------------------------------------------------------------------------
  # Lint — go vet + staticcheck.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed  # v5.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - name: Lint
        run: bash scripts/lint/go.sh

  # ---------------------------------------------------------------------------
  # Unit Tests — compile and run on all three supported platforms.
  # Matrix validates runtime compatibility; the binary is NOT reused across
  # platforms here because go test compiles a test binary for each target.
  # ---------------------------------------------------------------------------
  unit:
    name: Unit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed  # v5.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Unit tests
        shell: bash
        run: bash scripts/test/ci.sh

  # ---------------------------------------------------------------------------
  # Build — produce linux/amd64 binaries for Docker image delivery.
  # Artifacts are uploaded for downstream integrity validation.
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      GOOS: linux
      GOARCH: amd64
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed  # v5.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build min
        run: bash scripts/build/ci_min.sh
      - name: Build max (no FIPS)
        run: bash scripts/build/ci_max_no_fips.sh
      - name: Generate checksums
        run: bash scripts/release/checksums.sh
      - uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.6.1
        with:
          name: dist-linux
          path: dist/
          retention-days: 3

  # ---------------------------------------------------------------------------
  # Build (FIPS) — linux/amd64 FIPS build with compile-time symbol verification.
  # Kept as a separate job because the FIPS toolchain path and timeout differ.
  # ---------------------------------------------------------------------------
  build-fips:
    name: Build (FIPS)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      GOOS: linux
      GOARCH: amd64
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed  # v5.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build FIPS + verify symbols
        run: bash scripts/build/ci_max.sh
      - uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.6.1
        with:
          name: dist-fips
          path: dist/keel-fips
          retention-days: 3

  # ---------------------------------------------------------------------------
  # Integrity — BATS suite validates the built artifact, not a hypothetical.
  # Downloads the artifact produced by the build job before running tests.
  # ---------------------------------------------------------------------------
  integrity:
    name: Integrity (BATS)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          name: dist-linux
          path: dist/
      - name: Verify artifact checksums
        run: bash scripts/release/checksums.sh --verify
      - name: Make binaries executable
        run: chmod +x dist/keel-*
      - name: Generate TLS certs
        run: bash tests/fixtures/gen-certs.sh
      - name: Install bats-core
        run: bash scripts/ci/setup-bats.sh
      - name: Run integrity suite
        run: bats tests/integrity.bats

  # ---------------------------------------------------------------------------
  # Integrity (macOS) — portability validation on darwin/arm64; confirms the
  # binary compiles and BATS signal tests pass on Darwin. Not a release artifact.
  # ---------------------------------------------------------------------------
  integrity-macos:
    name: Integrity (BATS, macOS)
    runs-on: macos-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      GOOS: darwin
      GOARCH: arm64
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed  # v5.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build min
        run: bash scripts/build/ci_min.sh
      - name: Generate TLS certs
        run: bash tests/fixtures/gen-certs.sh
      - name: Install bats-core
        run: bash scripts/ci/setup-bats.sh
      - name: Run integrity suite
        run: bats tests/integrity.bats

  # ---------------------------------------------------------------------------
  # Example (BATS) — builds examples/myapp, generates TLS certs, runs myapp.bats.
  # Validates the library-mode usage pattern end-to-end.
  # ---------------------------------------------------------------------------
  example:
    name: Example (BATS)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed  # v5.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Generate TLS certs
        run: bash tests/fixtures/gen-certs.sh
      - name: Build myapp
        run: bash scripts/build/ci_example.sh
      - name: Install bats-core
        run: bash scripts/ci/setup-bats.sh
      - name: Run example BATS suite
        run: bats examples/myapp/myapp.bats

  # ---------------------------------------------------------------------------
  # Windows Smoke — portability validation on windows/amd64; confirms the
  # no-op signal stub compiles and the binary starts cleanly. Not a release artifact.
  # ---------------------------------------------------------------------------
  # ---------------------------------------------------------------------------
  # Compose Integration — spins up the full docker-compose.test.yaml topology
  # (keel max-flavor + upstream + observability stack), runs all compose tests
  # including the HTTP/3 QUIC probe, then tears down.
  # Runs on ubuntu-latest only (Docker Compose not available on macOS/Windows
  # GHA runners without additional setup).
  # ---------------------------------------------------------------------------
  compose:
    name: Compose Integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed  # v5.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Run compose integration tests
        env:
          KEEL_COMPOSE_TESTS: "1"
        run: bash scripts/test/compose.sh

  build-windows-smoke:
    name: Windows Smoke
    runs-on: windows-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      GOOS: windows
      GOARCH: amd64
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed  # v5.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build and smoke test
        shell: bash
        run: bash scripts/build/ci_smoke_windows.sh