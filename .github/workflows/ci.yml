name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs for the same branch/PR.
# Keep main-branch runs to completion so history is complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Default: least privilege. Jobs that need more declare it explicitly.
permissions:
  contents: read

jobs:

  # ---------------------------------------------------------------------------
  # PR Policy — required gate; runs before build and test jobs.
  # All policy logic lives in scripts/ci/pr-policy.sh.
  # ---------------------------------------------------------------------------
  pr-policy:
    name: PR Policy
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Check PR policy
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: make ci-pr-policy

  # ---------------------------------------------------------------------------
  # CI Audit — required gate; verifies all run: steps are make <target>,
  # all scripts have targets, and universal canonical targets exist.
  # ---------------------------------------------------------------------------
  ci-audit:
    name: CI Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run CI/Makefile audit
        run: make audit

  # ---------------------------------------------------------------------------
  # Secret Scan — required gate; runs on every push and PR.
  # ---------------------------------------------------------------------------
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Scan for secrets
        run: make ci-secret-scan

  # ---------------------------------------------------------------------------
  # Consistency — verifies Go config struct, Helm values, configmap template,
  # and config-reference.md are globally in sync.
  # ---------------------------------------------------------------------------
  consistency:
    name: Consistency
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          submodules: recursive
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed  # v5.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Install Helm
        run: make setup-helm
      - name: Install bats-core
        run: make setup-bats
      - name: Run consistency suite
        run: make test-consistency

  # ---------------------------------------------------------------------------
  # Lint — go vet + staticcheck.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed  # v5.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Install staticcheck
        run: make setup-staticcheck
      - name: Lint
        run: make lint-go
      - name: Check trailing newlines
        run: make lint-newlines

  # ---------------------------------------------------------------------------
  # Unit Tests — compile and run on all three supported platforms.
  # Matrix validates runtime compatibility; the binary is NOT reused across
  # platforms here because go test compiles a test binary for each target.
  # ---------------------------------------------------------------------------
  unit:
    name: Unit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed  # v5.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Unit tests
        shell: bash
        run: make test-unit
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@1e68e06f1dbfde0e4cefc87efeba9e4643565303  # v5.1.2
        with:
          files: coverage.txt
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  # ---------------------------------------------------------------------------
  # Coverage Delta — PR-only gate. Measures coverage at the merge-target commit
  # (base), then at the PR head, and fails if the drop exceeds 1 percentage point.
  # No stored baseline; the base branch is measured live on every PR.
  # ---------------------------------------------------------------------------
  coverage-delta:
    name: Coverage Delta
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed  # v5.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Check coverage delta
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          COVERAGE_THRESHOLD: '1.0'
        run: make ci-coverage-delta

  # ---------------------------------------------------------------------------
  # Build — produce linux/amd64 binaries for Docker image delivery.
  # Artifacts are uploaded for downstream integrity validation.
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      GOOS: linux
      GOARCH: amd64
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed  # v5.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build min
        run: make min
      - name: Build max (no FIPS)
        run: make max-no-fips
      - name: Generate checksums
        run: make release-checksums
      - uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.6.1
        with:
          name: dist-linux
          path: dist/
          retention-days: 3

  # ---------------------------------------------------------------------------
  # Build (FIPS) — linux/amd64 FIPS build with compile-time symbol verification.
  # Kept as a separate job because the FIPS toolchain path and timeout differ.
  # ---------------------------------------------------------------------------
  build-fips:
    name: Build (FIPS)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      GOOS: linux
      GOARCH: amd64
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed  # v5.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build FIPS + verify symbols
        run: make max
      - uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.6.1
        with:
          name: dist-fips
          path: dist/keel-fips
          retention-days: 3

  # ---------------------------------------------------------------------------
  # Integrity — BATS suite validates the built artifact, not a hypothetical.
  # Downloads the artifact produced by the build job before running tests.
  # ---------------------------------------------------------------------------
  integrity:
    name: Integrity (BATS)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed  # v5.4.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          name: dist-linux
          path: dist/
      - name: Verify artifact checksums
        run: make release-checksums-verify
      - name: Make binaries executable
        run: make dist-chmod
      - name: Generate TLS certs
        run: make gen-certs
      - name: Install bats-core
        run: make setup-bats
      - name: Install pebble
        run: make setup-pebble
      - name: Run integrity suite
        run: make bats-integrity

  # ---------------------------------------------------------------------------
  # Integrity (macOS) — portability validation on darwin/arm64; confirms the
  # binary compiles and BATS signal tests pass on Darwin. Not a release artifact.
  # ---------------------------------------------------------------------------
  integrity-macos:
    name: Integrity (BATS, macOS)
    runs-on: macos-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      GOOS: darwin
      GOARCH: arm64
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed  # v5.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build min
        run: make min
      - name: Generate TLS certs
        run: make gen-certs
      - name: Install bats-core
        run: make setup-bats
      - name: Install pebble
        run: make setup-pebble
      - name: Run integrity suite
        run: make bats-integrity

  # ---------------------------------------------------------------------------
  # Example (BATS) — builds examples/myapp, generates TLS certs, runs myapp.bats.
  # Validates the library-mode usage pattern end-to-end.
  # ---------------------------------------------------------------------------
  example:
    name: Example (BATS)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed  # v5.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Generate TLS certs
        run: make gen-certs
      - name: Build myapp
        run: make ci-build-example
      - name: Install bats-core
        run: make setup-bats
      - name: Run example BATS suite
        run: make bats-example

  # ---------------------------------------------------------------------------
  # Windows Smoke — portability validation on windows/amd64; confirms the
  # no-op signal stub compiles and the binary starts cleanly. Not a release artifact.
  # ---------------------------------------------------------------------------
  # ---------------------------------------------------------------------------
  # Compose Integration — spins up the tests/compose/docker-compose.test.yaml topology
  # (keel max-flavor + upstream + observability stack), runs all compose tests
  # including the HTTP/3 QUIC probe, then tears down.
  # Runs on ubuntu-latest only (Docker Compose not available on macOS/Windows
  # GHA runners without additional setup).
  # ---------------------------------------------------------------------------
  compose:
    name: Compose Integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed  # v5.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Run compose integration tests
        env:
          KEEL_COMPOSE_TESTS: "1"
        run: make test-compose

  # ---------------------------------------------------------------------------
  # Kubernetes (kind) — builds keel:test image, loads it into a single-node
  # kind cluster, deploys via Helm, then runs pod readiness + probe + restart
  # tests. Runs on ubuntu-latest only; downloads dist-linux artifact.
  # ---------------------------------------------------------------------------
  k8s:
    name: Kubernetes (kind)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Install Helm
        run: make setup-helm
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          name: dist-linux
          path: dist/
      - name: Make binaries executable
        run: make dist-chmod
      - name: Run k8s integration tests
        run: make test-k8s

  build-windows-smoke:
    name: Windows Smoke
    runs-on: windows-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      GOOS: windows
      GOARCH: amd64
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed  # v5.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build and smoke test
        shell: bash
        run: make ci-smoke-windows
