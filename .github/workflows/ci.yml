name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs for the same branch/PR.
# Keep main-branch runs to completion so history is complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Default: least privilege. Jobs that need more declare it explicitly.
permissions:
  contents: read

jobs:

  # ---------------------------------------------------------------------------
  # PR Policy — required gate; runs before build and test jobs.
  # All policy logic lives in scripts/ci/pr-policy.sh.
  # ---------------------------------------------------------------------------
  pr-policy:
    name: PR Policy
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Check PR policy
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: bash scripts/ci/pr-policy.sh

  # ---------------------------------------------------------------------------
  # Secret Scan — required gate; runs on every push and PR.
  # ---------------------------------------------------------------------------
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Scan for secrets
        run: bash scripts/ci/secret-scan.sh

  # ---------------------------------------------------------------------------
  # Lint — go vet + staticcheck.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed  # v5.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - name: Lint
        run: bash scripts/lint/go.sh

  # ---------------------------------------------------------------------------
  # Unit Tests — compile and run on all three supported platforms.
  # Matrix validates runtime compatibility; the binary is NOT reused across
  # platforms here because go test compiles a test binary for each target.
  # ---------------------------------------------------------------------------
  unit:
    name: Unit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed  # v5.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Unit tests
        shell: bash
        run: bash scripts/test/ci.sh

  # ---------------------------------------------------------------------------
  # Build — produce Linux binaries via cross-compilation on a single runner.
  # Artifacts are uploaded for downstream integrity validation.
  # NOTE: A future scripts/build/ci_cross.sh will add darwin/windows targets
  # from this same job via GOOS/GOARCH flags.
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed  # v5.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build min
        run: bash scripts/build/ci_min.sh
      - name: Build max (no FIPS)
        run: bash scripts/build/ci_max_no_fips.sh
      - name: Generate checksums
        run: bash scripts/release/checksums.sh
      - uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.6.1
        with:
          name: dist-linux
          path: dist/
          retention-days: 3

  # ---------------------------------------------------------------------------
  # Build (FIPS) — FIPS build includes compile-time symbol verification.
  # Kept as a separate job because the FIPS toolchain path and timeout differ.
  # ---------------------------------------------------------------------------
  build-fips:
    name: Build (FIPS)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed  # v5.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build FIPS + verify symbols
        run: bash scripts/build/ci_max.sh
      - uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.6.1
        with:
          name: dist-fips
          path: dist/keel-fips
          retention-days: 3

  # ---------------------------------------------------------------------------
  # Integrity — BATS suite validates the built artifact, not a hypothetical.
  # Downloads the artifact produced by the build job before running tests.
  # ---------------------------------------------------------------------------
  integrity:
    name: Integrity (BATS)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/download-artifact@fa0a91b85d4f404e444306234a5a289f7e31e7ee  # v4.1.8
        with:
          name: dist-linux
          path: dist/
      - name: Verify artifact checksums
        run: bash scripts/release/checksums.sh --verify
      - name: Make binaries executable
        run: chmod +x dist/keel-*
      - name: Install bats-core
        run: sudo apt-get install -y bats
      - name: Run integrity suite
        run: bats tests/integrity.bats