name: Release

on:
  push:
    tags: ['v*']

# No concurrency control: release runs must complete; never cancel them.

# Default: least privilege. The publish job escalates only what it needs.
permissions:
  contents: read

jobs:

  # ---------------------------------------------------------------------------
  # Build — produce all release artifacts on a single Linux runner.
  # The canonical artifact is built once here and promoted to release.
  # No per-platform rebuild; cross-compilation handles linux/darwin/windows.
  # NOTE: darwin and windows cross-compiled targets will be added via a future
  # scripts/build/ci_cross.sh; only linux artifacts ship in the initial release.
  # ---------------------------------------------------------------------------
  build:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed  # v5.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build min
        run: bash scripts/build/ci_min.sh
      - name: Build max (no FIPS)
        run: bash scripts/build/ci_max_no_fips.sh
      - name: Build max (FIPS) + verify symbols
        run: bash scripts/build/ci_max.sh
      - name: Generate SBOM
        run: bash scripts/release/sbom.sh
      - name: Generate checksums
        run: bash scripts/release/checksums.sh
      - uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.6.1
        with:
          name: release-artifacts
          path: dist/
          # Retain for 7 days to allow post-release investigation if needed.
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Publish — download the already-built artifacts, verify checksums, sign,
  # and upload to GitHub Release. Requires human approval via environment
  # protection rules (configure in repo Settings → Environments → release).
  #
  # Permissions elevated only in this job:
  #   contents: write — create the GitHub Release and upload assets
  #   id-token: write — OIDC token for cosign keyless signing
  # ---------------------------------------------------------------------------
  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/download-artifact@fa0a91b85d4f404e444306234a5a289f7e31e7ee  # v4.1.8
        with:
          name: release-artifacts
          path: dist/
      - name: Verify artifact checksums
        run: bash scripts/release/checksums.sh --verify
      - name: Install cosign
        run: |
          curl -fsSL https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64 \
            -o /usr/local/bin/cosign
          chmod +x /usr/local/bin/cosign
      - name: Sign artifacts
        run: bash scripts/release/sign.sh
      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/release/upload.sh ${{ github.ref_name }}