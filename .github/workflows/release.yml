name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# No concurrency control: release runs must complete; never cancel them.

# Default: least privilege. The publish job escalates only what it needs.
permissions:
  contents: read

jobs:

  # ---------------------------------------------------------------------------
  # Build — produce linux/amd64 release artifacts for Docker image delivery.
  # The canonical artifact is built once here and promoted to release.
  # Windows and macOS portability is validated in CI but those binaries are
  # not released; the Docker image is the distribution vehicle for all platforms.
  # ---------------------------------------------------------------------------
  build:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      GOOS: linux
      GOARCH: amd64
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed  # v5.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build min
        run: make min
      - name: Build max (no FIPS)
        run: make max-no-fips
      - name: Build max (FIPS) + verify symbols
        run: make max
      - name: Rename artifacts with platform suffix
        run: make release-rename
      - name: Install syft
        run: make setup-syft
      - name: Generate SBOM
        run: make release-sbom
      - name: Generate checksums
        run: make release-checksums
      - uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.6.1
        with:
          name: release-artifacts
          path: dist/
          # Retain for 7 days to allow post-release investigation if needed.
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Publish — download the already-built artifacts, verify checksums, sign,
  # and upload to GitHub Release. Requires human approval via environment
  # protection rules (configure in repo Settings → Environments → release).
  #
  # Permissions elevated only in this job:
  #   contents: write — create the GitHub Release and upload assets
  #   id-token: write — OIDC token for cosign keyless signing
  # ---------------------------------------------------------------------------
  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          name: release-artifacts
          path: dist/
      - name: Verify artifact checksums
        run: make release-checksums-verify
      - name: Install cosign
        run: make setup-cosign
      - name: Sign artifacts
        run: make release-sign
      - name: Generate SLSA provenance attestation
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2  # v2.2.3
        with:
          subject-path: 'dist/keel-*'
      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: make release-upload
      - name: Build and push container images
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: make release-docker
      - name: Package and push Helm chart
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: make release-helm-push
